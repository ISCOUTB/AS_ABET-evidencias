version: '3.8'

services:
  moodle-api:
    build: .
    container_name: moodle-api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - moodle-network

networks:
  moodle-network:
    driver: bridge
